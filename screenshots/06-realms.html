<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishSpellPad App Store 截图 — 修仙境界进度</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="screenshot bg-light">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="content">
            <div class="section-title">🏔️ 5 个修仙境界</div>
            <div class="section-subtitle">从练气到化神, 每天 15 分钟累积成就</div>

            <!-- 当前境界卡 -->
            <div style="background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); border-radius: 32px; padding: 56px 64px; margin-bottom: 48px; color: white; box-shadow: 0 12px 40px rgba(245, 158, 11, 0.4);">
                <div style="display: flex; align-items: center; gap: 40px;">
                    <div style="font-size: 160px; line-height: 1;">🌟</div>
                    <div style="flex: 1;">
                        <div style="font-size: 56px; font-weight: 800;">金丹期 · 已激活</div>
                        <div style="font-size: 36px; opacity: 0.9; margin-top: 8px;">30 天连续学习 · 历史最高 45 天</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 120px; font-weight: 900; line-height: 1;">30</div>
                        <div style="font-size: 28px; opacity: 0.85;">天</div>
                    </div>
                </div>
                <!-- 进度条 -->
                <div style="margin-top: 32px; background: rgba(255,255,255,0.25); height: 24px; border-radius: 12px; overflow: hidden;">
                    <div style="background: white; height: 100%; width: 30%; border-radius: 12px;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 12px; font-size: 28px; opacity: 0.9;">
                    <span>0 天</span>
                    <span>还差 70 天 → 元婴期 ✨</span>
                    <span>100 天</span>
                </div>
            </div>

            <!-- 5 境界卡 -->
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px;">
                <div class="realm-card" style="border-color: #2563eb; opacity: 0.6;">
                    <div class="realm-emoji">☁️</div>
                    <div class="realm-name" style="color: #2563eb;">练气</div>
                    <div class="realm-days">1+ 天</div>
                    <div style="font-size: 24px; color: var(--text-secondary); margin-top: 8px;">✓ 已过</div>
                </div>
                <div class="realm-card" style="border-color: #10b981; opacity: 0.6;">
                    <div class="realm-emoji">🏔️</div>
                    <div class="realm-name" style="color: #10b981;">筑基</div>
                    <div class="realm-days">7+ 天</div>
                    <div style="font-size: 24px; color: var(--text-secondary); margin-top: 8px;">✓ 已过</div>
                </div>
                <div class="realm-card" style="border-color: #f59e0b; box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3);">
                    <div class="realm-emoji">🌟</div>
                    <div class="realm-name" style="color: #f59e0b;">金丹</div>
                    <div class="realm-days">30+ 天</div>
                    <div style="font-size: 28px; color: var(--accent); font-weight: 700; margin-top: 8px;">当前</div>
                </div>
                <div class="realm-card" style="border-color: #ec4899; opacity: 0.4;">
                    <div class="realm-emoji">✨</div>
                    <div class="realm-name" style="color: #ec4899;">元婴</div>
                    <div class="realm-days">100+ 天</div>
                    <div style="font-size: 24px; color: var(--text-secondary); margin-top: 8px;">🔒</div>
                </div>
                <div class="realm-card" style="border-color: #ef4444; opacity: 0.4;">
                    <div class="realm-emoji">👑</div>
                    <div class="realm-name" style="color: #ef4444;">化神</div>
                    <div class="realm-days">365+ 天</div>
                    <div style="font-size: 24px; color: var(--text-secondary); margin-top: 8px;">🔒</div>
                </div>
            </div>
        </div>

        <div class="cta-bar">
            <div class="cta-url dark">11 个成就 · 4 个修仙彩蛋 · 漏一天归零</div>
        </div>

        <div class="home-indicator"></div>
    </div>
</body>
</html>
