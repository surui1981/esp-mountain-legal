<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishSpellPad App Store 截图 — 拼写游戏</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="screenshot bg-light">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="content">
            <!-- 顶部 HUD -->
            <div style="display: flex; gap: 24px; margin-bottom: 48px;">
                <div class="feature-card" style="flex: 1; padding: 32px;">
                    <div style="font-size: 56px; font-weight: 800; color: var(--primary);">240</div>
                    <div style="font-size: 28px; color: var(--text-secondary);">分数</div>
                </div>
                <div class="feature-card" style="flex: 1; padding: 32px;">
                    <div style="font-size: 56px; font-weight: 800; color: var(--accent);">12</div>
                    <div style="font-size: 28px; color: var(--text-secondary);">连击 🔥</div>
                </div>
                <div class="feature-card" style="flex: 1; padding: 32px;">
                    <div style="font-size: 56px; font-weight: 800; color: var(--success);">17/25</div>
                    <div style="font-size: 28px; color: var(--text-secondary);">进度</div>
                </div>
            </div>

            <!-- 当前单词卡 -->
            <div class="word-card" style="padding: 100px 60px;">
                <div style="font-size: 36px; color: var(--text-secondary); margin-bottom: 16px;">看中文, 拼写英文</div>
                <div style="font-size: 140px; font-weight: 800; color: var(--text); letter-spacing: -2px;">猫</div>
                <div style="font-size: 36px; color: var(--text-secondary); margin-top: 16px;">/kæt/</div>
            </div>

            <!-- 输入框 mock -->
            <div style="background: white; border-radius: 32px; padding: 60px; margin-top: 48px; border: 3px solid var(--primary); box-shadow: 0 8px 32px rgba(37, 99, 235, 0.15);">
                <div style="display: flex; justify-content: center; gap: 20px; font-size: 120px; font-weight: 800; color: var(--primary); letter-spacing: 20px;">
                    C &nbsp; A &nbsp; T
                </div>
            </div>

            <!-- 提示条 -->
            <div style="margin-top: 48px; text-align: center; padding: 32px; background: rgba(16, 185, 129, 0.1); border-radius: 24px; border: 2px solid rgba(16, 185, 129, 0.3);">
                <div style="font-size: 48px; color: var(--success); font-weight: 700;">✓ 正确! +15 分 · 连击 +1</div>
            </div>
        </div>

        <div class="cta-bar">
            <div class="cta-url dark">实时反馈 + 连击奖励 + 金光特效</div>
        </div>

        <div class="home-indicator"></div>
    </div>
</body>
</html>
