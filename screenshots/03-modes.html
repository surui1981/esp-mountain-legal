<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishSpellPad App Store 截图 — 7 大学习模式</title>
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <div class="screenshot bg-light">
        <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">

        </div>

        <div class="content">

            <div class="grid grid-2" style="gap: 40px;">
                <div class="feature-card" style="border-color: #2563eb;">
                    <div class="icon">⌨️</div>
                    <div class="title">拼写模式</div>
                    <div class="desc">看中文写英文, 基础必备</div>
                </div>
                <div class="feature-card" style="border-color: #8b5cf6;">

                    <div class="desc">训练耳朵, 听到拼对</div>
                </div>
                <div class="feature-card" style="border-color: #f59e0b;">
                    <div class="icon">✍️</div>
                    <div class="title">单词默写</div>

                <div class="feature-card" style="border-color: #10b981;">

                    <div class="desc">真实语境填空</div>

                <div class="feature-card" style="border-color: #ec4899;">

                    <div class="title">发音组合</div>
                    <div class="desc">音标拼读小游戏</div>
                </div>
                <div class="feature-card" style="border-color: #ef4444;">
                    <div class="icon">🧠</div>
                    <div class="title">双向映射</div>
                    <div class="desc">英文↔中文卡片配对</div>
                </div>
            </div>
        </div>

        <div class="cta-bar">
            <div class="cta-url dark">同步学习单元: 听音 + 拼写 + 默写 共享 25 词 · 三维记忆</div>
        </div>

        <div class="home-indicator"></div>
    </div>
